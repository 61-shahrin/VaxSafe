<style>
/* ========================================
   MODERN HORIZONTAL NAVIGATION
   ======================================== */

.nav_two {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 40px;
  background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
  box-shadow: 0 4px 15px rgba(0, 119, 182, 0.15);
  position: sticky;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(10px);
}

.nav_two .logo img {
  height: 50px;
  width: auto;
  transition: transform 0.3s ease;
}

.nav_two .logo img:hover {
  transform: scale(1.05);
}

.nav_two .nav-links {
  display: flex;
  align-items: center;
  list-style: none;
  gap: 15px;
  margin: 0;
  padding: 0;
}

/* FIX: position:relative এবং display:inline-block দরকার */
.nav_two .nav-links > li {
  position: relative;
  display: inline-block;
}

/* Base Navigation Button Style */
.nav-btn {
  padding: 12px 24px;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  /* FIX: transition থেকে transform সরিয়ে দিলাম — উপরে উঠলে gap তৈরি হয় */
  transition: box-shadow 0.3s ease, filter 0.3s ease;
  position: relative;
  overflow: hidden;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: white;
  color: #2c3e50;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

/* Ripple Effect */
.nav-btn::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.5);
  transform: translate(-50%, -50%);
  transition: width 0.5s, height 0.5s;
}

.nav-btn:active::before {
  width: 200px;
  height: 200px;
}

/* Dashboard Button */
.nav-btn-1 {
  background: linear-gradient(135deg, #00b4d8 0%, #0077b6 100%);
  color: white;
  box-shadow: 0 4px 12px rgba(0, 180, 216, 0.3);
}
.nav-btn-1:hover {
  /* FIX: translateY সরিয়ে শুধু shadow বাড়ালাম */
  box-shadow: 0 6px 20px rgba(0, 180, 216, 0.5);
  filter: brightness(1.08);
}

/* Schedule Button */
.nav-btn-2 {
  background: linear-gradient(135deg, #48c6ef 0%, #6f86d6 100%);
  color: white;
  box-shadow: 0 4px 12px rgba(72, 198, 239, 0.3);
}
.nav-btn-2:hover {
  box-shadow: 0 6px 20px rgba(72, 198, 239, 0.5);
  filter: brightness(1.08);
}

/* Centers Button */
.nav-btn-3 {
  background: linear-gradient(135deg, #0ba360 0%, #3cba92 100%);
  color: white;
  box-shadow: 0 4px 12px rgba(11, 163, 96, 0.3);
}
.nav-btn-3:hover {
  box-shadow: 0 6px 20px rgba(11, 163, 96, 0.5);
  filter: brightness(1.08);
}

/* News Button */
.nav-btn-4 {
  background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
  color: white;
  box-shadow: 0 4px 12px rgba(250, 112, 154, 0.3);
}
.nav-btn-4:hover {
  box-shadow: 0 6px 20px rgba(250, 112, 154, 0.5);
  filter: brightness(1.08);
}

/* Profile Button */
.nav-btn-profile {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
}
.nav-btn-profile:hover {
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
  filter: brightness(1.08);
}
.nav-btn-profile i {
  font-size: 18px;
}

/* Language Button */
.nav-btn-lang {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  color: white;
  box-shadow: 0 4px 12px rgba(240, 147, 251, 0.3);
}
.nav-btn-lang:hover {
  box-shadow: 0 6px 20px rgba(240, 147, 251, 0.5);
  filter: brightness(1.08);
}

/* Arrow Animation */
.dropdown-arrow {
  display: inline-block;
  margin-left: 5px;
  transition: transform 0.3s ease;
}

/* Active State */
.nav-btn.active {
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3) !important;
  filter: brightness(1.15);
}

/* ========================================
   DROPDOWN — CORE FIX
   ======================================== */

/* FIX ১: margin-top: 10px ছিল — এটাই মূল gap সমস্যা।
   এখন margin-top: 0, বদলে dropdown-এর ভেতরে padding-top দিলাম
   যাতে visually space থাকে কিন্তু physically কোনো gap নেই। */
.dropdown {
  position: absolute;
  top: 100%;
  right: 0;
  margin-top: 0;          /* ← ছিল 10px, এখন 0 */
  padding-top: 12px;      /* ← visual space এখন ভেতরে */
  padding-bottom: 8px;
  background: white;
  border-radius: 0 0 12px 12px;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
  list-style: none;
  min-width: 160px;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-5px);
  transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s ease;
  z-index: 9999;
  pointer-events: none;
}

/* FIX ২: button আর dropdown-এর মাঝে invisible bridge
   mouse যখন margin area-তে থাকে তখনও dropdown ধরে রাখে */
.dropdown::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 0;
  right: 0;
  height: 10px;
  background: transparent;
}

.dropdown.show {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
  pointer-events: auto;
}

/* Dropdown items */
.dropdown li {
  padding: 0;
  margin: 0;
  list-style: none;
  cursor: pointer;
  user-select: none;
}

.dropdown li a {
  display: block;
  padding: 12px 20px;
  color: #2c3e50 !important;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: background 0.2s ease, color 0.2s ease;
  cursor: pointer;
}

.dropdown li:hover {
  background: linear-gradient(135deg, #00b4d8 0%, #0077b6 100%);
}

.dropdown li:hover a,
.dropdown li:hover {
  color: white !important;
}

.dropdown li:first-child:hover {
  border-radius: 0;
}
.dropdown li:last-child:hover {
  border-radius: 0 0 12px 12px;
}

/* Language dropdown-এর plain li (a ছাড়া) */
.dropdown li:not(:has(a)) {
  padding: 12px 20px;
  color: #2c3e50;
  font-size: 14px;
  font-weight: 500;
}

/* ========================================
   RESPONSIVE
   ======================================== */
@media (max-width: 1024px) {
  .nav_two { padding: 12px 20px; }
  .nav-links { gap: 10px; }
  .nav-btn { padding: 10px 20px; font-size: 14px; }
}

@media (max-width: 768px) {
  .nav_two { flex-direction: column; gap: 15px; padding: 15px; }
  .nav-links { flex-wrap: wrap; justify-content: center; gap: 8px; }
  .nav-btn { padding: 10px 18px; font-size: 13px; }
  .dropdown {
    left: 50%;
    right: auto;
    transform: translateX(-50%) translateY(-5px);
  }
  .dropdown.show {
    transform: translateX(-50%) translateY(0);
  }
}

@media (max-width: 480px) {
  .nav-links { width: 100%; }
  .nav-links > li { flex: 1 1 45%; }
  .nav-btn { width: 100%; justify-content: center; padding: 12px 16px; font-size: 13px; }
}
</style>

<script>
// ── Active nav link ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function () {
  const currentPath = window.location.pathname;
  document.querySelectorAll('.nav-btn').forEach(link => {
    if (link.getAttribute('href') === currentPath) {
      link.classList.add('active');
    }
  });
});

// ── Dropdown toggle ──────────────────────────────────────────
function toggleDropdown(event, dropdownId) {
  event.preventDefault();
  event.stopPropagation();

  const dropdown = document.getElementById(dropdownId);
  const button   = event.currentTarget;
  const arrow    = button.querySelector('.dropdown-arrow');
  const isOpen   = dropdown.classList.contains('show');

  // সব dropdown বন্ধ করো
  closeAllDropdowns();

  // যদি বন্ধ ছিল তাহলে খোলো
  if (!isOpen) {
    dropdown.classList.add('show');
    if (arrow) arrow.style.transform = 'rotate(180deg)';
  }
}

// ── সব dropdown বন্ধ করার helper ───────────────────────────
function closeAllDropdowns() {
  document.querySelectorAll('.dropdown').forEach(dd => dd.classList.remove('show'));
  document.querySelectorAll('.dropdown-arrow').forEach(arr => arr.style.transform = 'rotate(0deg)');
}

// ── Document click — সম্পূর্ণ বাইরে click হলেই বন্ধ ────────
// FIX: pointer-events: none থাকায় dropdown-এর উপর click
//      document-এ bubble করে না, তাই এটা নিরাপদ
document.addEventListener('click', function (e) {
  if (!e.target.closest('.profile-menu') && !e.target.closest('.lang-menu')) {
    closeAllDropdowns();
  }
});

// ── Language selector ────────────────────────────────────────
// (নিচের IIFE-র window.setLanguage দিয়ে override হবে)
function setLanguage(lang) {
  const code = (lang === 'Bangla' || lang === 'bn') ? 'bn' : 'en';
  window._applyLanguage && window._applyLanguage(code);
  closeAllDropdowns();
}
</script>

  // Reverse map: বাংলা → English
  const reverseMap = {};
  for (const [en, bn] of Object.entries(translations)) {
    reverseMap[bn] = en;
  }

  // ── FIX: data-original-text দিয়ে সব text node cache করো ──
  // এতে বারবার translate করলেও loop হবে না
  function cacheOriginalText(root) {
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        const parent = node.parentElement;
        if (!parent) return NodeFilter.FILTER_REJECT;
        const tag = parent.tagName.toLowerCase();
        if (['script', 'style', 'select', 'option'].includes(tag)) return NodeFilter.FILTER_REJECT;
        if (node.textContent.trim() === '') return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    while (walker.nextNode()) {
      const node = walker.currentNode;
      // শুধু একবার original text save করো
      if (!node._originalText) {
        node._originalText = node.textContent;
      }
    }
  }

  function applyTranslation(root, toBangla) {
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        const parent = node.parentElement;
        if (!parent) return NodeFilter.FILTER_REJECT;
        const tag = parent.tagName.toLowerCase();
        if (['script', 'style', 'select', 'option'].includes(tag)) return NodeFilter.FILTER_REJECT;
        if (!node._originalText) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    while (walker.nextNode()) {
      const node = walker.currentNode;
      const original = node._originalText.trim();
      if (toBangla) {
        if (translations[original]) {
          node.textContent = node._originalText.replace(original, translations[original]);
        }
      } else {
        // English-এ ফিরুন — সবসময় original text থেকে
        node.textContent = node._originalText;
      }
    }
  }

  function applyPlaceholders(toBangla) {
    document.querySelectorAll('[placeholder]').forEach(el => {
      if (!el._originalPlaceholder) {
        el._originalPlaceholder = el.getAttribute('placeholder');
      }
      const orig = el._originalPlaceholder;
      el.setAttribute('placeholder', toBangla
        ? (translations[orig] || orig)
        : orig
      );
    });
  }

  function updateLangButton(lang) {
    const btn = document.getElementById('lang-btn');
    if (btn) {
      btn.innerHTML = (lang === 'bn' ? 'বাংলা' : 'Language') + ' <span class="dropdown-arrow">▼</span>';
    }
  }

  // Global function — navbar button ও script উভয়ে ব্যবহার করবে
  window._applyLanguage = function (lang) {
    localStorage.setItem(LANG_KEY, lang);
    const toBangla = (lang === 'bn');
    cacheOriginalText(document.body);
    applyTranslation(document.body, toBangla);
    applyPlaceholders(toBangla);
    updateLangButton(lang);
  };

  // setLanguage override
  window.setLanguage = function (lang) {
    const code = (lang === 'Bangla' || lang === 'bn') ? 'bn' : 'en';
    window._applyLanguage(code);
    // dropdown বন্ধ করো
    const dd = document.getElementById('lang-dropdown');
    if (dd) dd.classList.remove('show');
    const btn = document.getElementById('lang-btn');
    if (btn) {
      const arrow = btn.querySelector('.dropdown-arrow');
      if (arrow) arrow.style.transform = 'rotate(0deg)';
    }
  };

  // ── Page load-এ saved language apply করো ────────────────
  document.addEventListener('DOMContentLoaded', function () {
    const saved = localStorage.getItem(LANG_KEY);
    if (saved === 'bn') {
      // একটু delay দাও যাতে পুরো DOM ready থাকে
      setTimeout(() => window._applyLanguage('bn'), 100);
    }
  });
})();
